<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-3</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/42448c7c1f.js" crossorigin="anonymous"></script>

    <style>
        .sora {
            font-family: "Sora", sans-serif;
        }
    </style>
</head>
</head>

<body class="sora w-[100%]">
    <header>
        <!-- nav bar -->
        <nav class="bg-[#FFF9F4] py-9 flex items-center justify-between px-5 sm:justify-around">
            <div>
                <div class="flex text-center items-center gap-2">
                    <div>
                        <img src="c1-assets/logo-header.png" alt="">
                    </div>
                    <h3 class="text-xl text-black hidden sm:block">Browse <span class="text-yellow-300">4</span> Pets
                    </h3>
                </div>
            </div>
            <div class="sm:flex gap-5 hidden">
                <h4 class="text-lg text-black">Find a pet</h4>
                <h4 class="text-lg text-black">Breeds</h4>
                <h4 class="text-lg text-black">Contact us</h4>
            </div>
            <div class="sm:flex gap-5 items-center hidden">
                <div><i class="fa-solid fa-bell"></i></div>
                <div><i class="fa-solid fa-magnifying-glass"></i></div>
                <button class="text-black border-2 border-yellow-400 rounded-xl py-2 px-5">Login</button>
                <button class="text-black bg-yellow-300 py-2 px-5 rounded-lg">Register</button>
            </div>
            <div class="sm:hidden">
                <i class="fa-solid fa-bars"></i>
            </div>
        </nav>
        <!-- Banner part -->
        <section class="mt-20 sm:max-w-7xl mx-auto px-5">
            <div class="sm:relative">
                <div class="sm:relative z-10 sm:w-1/2 space-y-5">
                    <h3 class="text-6xl text-black font-bold">Pamper Your Pet,<br> Because They Deserve <br> the Bes
                    </h3>
                    <p class="text-xl text-black ">Discover a world of treats, toys, and essentials handpicked for your
                        furry
                        friends. Shop now and make
                        tails wag with joy!</p>
                    <button class="text-black text-xl px-10 py-3 bg-[#FFDC26] rounded-xl">Find a pet</button>
                </div>
                <div class="sm:absolute top-0 bottom-15">
                    <img src="c1-assets/cat-big.png" alt="">
                </div>
            </div>
        </section>
    </header>
</body>

</html>
